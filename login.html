<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Gestão de Territórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen antialiased">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">🗺️ Territórios</h1>
            <p class="text-gray-500 text-sm">Acesso restrito ao sistema de gestão.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required autocomplete="email" 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="seuemail@exemplo.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="••••••••">
                <p class="text-xs text-gray-400 mt-2">No primeiro acesso, a senha digitada será a sua senha definitiva.</p>
            </div>

            <div id="errorAlert" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                <p class="text-sm text-red-700 font-medium" id="errorMessage"></p>
            </div>

            <button type="submit" id="btnSubmit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150">
                Entrar
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Suas credenciais reais do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDSPdjkdU4mWRmd1ABjDLbjjbp8gqZWJs",
            authDomain: "territorios-e9dd4.firebaseapp.com",
            projectId: "territorios-e9dd4",
            storageBucket: "territorios-e9dd4.firebasestorage.app",
            messagingSenderId: "903988299465",
            appId: "1:903988299465:web:ca8acd8fcb9b6331636f18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');

        function redirecionarPorPapel(papel) {
            if (papel === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else if (papel === 'responsavel' || papel === 'publicador') {
                window.location.href = 'publicador.html';
            } else {
                auth.signOut();
                throw new Error('Papel de usuário não reconhecido pelo sistema.');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const originalBtnText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = 'Processando...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');
            errorAlert.classList.add('hidden');

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            let user;
            let isNewUser = false;

            try {
                // 1. TENTA LOGAR NORMALMENTE
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    user = userCredential.user;
                } catch (authError) {
                    // 2. SE NÃO EXISTIR OU CREDENCIAL INVÁLIDA, TENTA CRIAR
                    if (authError.code === 'auth/invalid-credential' || authError.code === 'auth/user-not-found') {
                        try {
                            const newUserCredential = await createUserWithEmailAndPassword(auth, email, password);
                            user = newUserCredential.user;
                            isNewUser = true;
                        } catch (createError) {
                            throw createError;
                        }
                    } else {
                        throw authError;
                    }
                }

                // 3. SINCRONIZAÇÃO DE PERFIL COM A FONTE DA VERDADE (AUTORIZAÇÕES)
                const userDocRef = doc(db, "usuarios", user.uid);
                
                const q = query(collection(db, "autorizacoes"), where("email", "==", email));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const autorizacaoData = querySnapshot.docs[0].data();
                    const papelAtribuido = autorizacaoData.papel || 'publicador';
                    const nomeAtribuido = autorizacaoData.nome || 'Irmão(ã)';

                    // Atualiza ou Cria o perfil em "usuarios" SEMPRE que logar (Auto-cura)
                    await setDoc(userDocRef, {
                        email: email,
                        papel: papelAtribuido,
                        nome: nomeAtribuido
                    }, { merge: true });

                    redirecionarPorPapel(papelAtribuido);
                } else {
                    if (isNewUser) {
                        await user.delete(); // Limpa conta indevida
                    }
                    await auth.signOut();
                    throw new Error('E-mail não autorizado. Solicite o acesso ao Administrador.');
                }

            } catch (error) {
                console.error("Erro no fluxo de autenticação:", error);
                
                let mensagem = "Ocorreu um erro ao processar o acesso.";
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    mensagem = "E-mail ou senha incorretos.";
                } else if (error.code === 'auth/too-many-requests') {
                    mensagem = "Muitas tentativas falhas. Tente novamente mais tarde.";
                } else if (error.code === 'auth/weak-password') {
                    mensagem = "A senha deve ter pelo menos 6 caracteres.";
                } else if (error.message) {
                    mensagem = error.message; 
                }

                errorMessage.textContent = mensagem;
                errorAlert.classList.remove('hidden');
            } finally {
                btnSubmit.innerHTML = originalBtnText;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
