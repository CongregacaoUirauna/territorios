<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Gestão de Territórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen antialiased">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">🗺️ Territórios</h1>
            <p class="text-gray-500 text-sm">Acesso restrito ao painel de gestão.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required autocomplete="email" 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="admin@congregacao.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="••••••••">
            </div>

            <div id="errorAlert" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                <p class="text-sm text-red-700 font-medium" id="errorMessage">Usuário ou senha inválidos.</p>
            </div>

            <button type="submit" id="btnSubmit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150">
                Entrar
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Suas credenciais reais do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDSPdjkdU4mWRmd1ABjDLbjjbp8gqZWJs",
            authDomain: "territorios-e9dd4.firebaseapp.com",
            projectId: "territorios-e9dd4",
            storageBucket: "territorios-e9dd4.firebasestorage.app",
            messagingSenderId: "903988299465",
            appId: "1:903988299465:web:ca8acd8fcb9b6331636f18"
        };

        // Inicialização
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Referências do DOM
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita o recarregamento da página
            
            // Estado de loading visual
            const originalBtnText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = 'Autenticando...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');
            errorAlert.classList.add('hidden');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                // 1. Tenta autenticar no Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Verifica o papel (Role) do usuário no Firestore
                // Esperamos que exista uma coleção 'usuarios' e o ID do documento seja o UID do usuário
                const userDocRef = doc(db, "usuarios", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    
                    if (userData.papel === 'admin') {
                        // Sucesso total: É usuário válido e é admin.
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        // É usuário válido (talvez um publicador comum), mas não tem acesso aqui.
                        await auth.signOut(); // Desloga imediatamente
                        throw new Error('Acesso negado. Você não tem permissão de administrador.');
                    }
                } else {
                    // Usuário logou, mas não tem cadastro na tabela de regras (Falha de segurança)
                    await auth.signOut();
                    throw new Error('Perfil de usuário não encontrado no sistema.');
                }

            } catch (error) {
                console.error("Erro no login:", error);
                
                // Tratamento amigável de erros do Firebase
                let mensagem = "Ocorreu um erro ao tentar entrar.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    mensagem = "E-mail ou senha incorretos.";
                } else if (error.code === 'auth/too-many-requests') {
                    mensagem = "Muitas tentativas falhas. Tente novamente mais tarde.";
                } else if (error.message) {
                    mensagem = error.message; // Mensagens customizadas (ex: Acesso negado)
                }

                errorMessage.textContent = mensagem;
                errorAlert.classList.remove('hidden');
            } finally {
                // Restaura o botão
                btnSubmit.innerHTML = originalBtnText;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
