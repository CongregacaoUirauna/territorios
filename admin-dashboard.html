<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gestão de Territórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 font-bold text-xl">
                    🗺️ Gestão Admin
                </div>
                <div>
                    <button id="btnLogout" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm font-semibold transition">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8">
            <h2 class="text-lg font-bold text-gray-700 mb-4">⚙️ Regras Inteligentes do Sistema</h2>
            <div class="flex items-center justify-between bg-gray-50 p-4 rounded border border-gray-100">
                <div>
                    <h3 class="font-semibold">Sugestão Automática de Territórios</h3>
                    <p class="text-sm text-gray-500">Quando ativo, o sistema sugere os territórios mais antigos para os publicadores.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggleSugestoes" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-gray-700">📍 Controle de Territórios</h2>
                <button id="btnNovoTerritorio" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-bold transition">+ Novo Território</button>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Território</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Responsável</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mapa</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaTerritorios" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Substitua pelas chaves reais do seu projeto Firebase
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        // Inicialização
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Referências do DOM
        const tabelaTerritorios = document.getElementById('tabelaTerritorios');
        const toggleSugestoes = document.getElementById('toggleSugestoes');

        // 1. Monitorar Autenticação (Proteção da Rota)
        /* onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; // Redireciona se não estiver logado
            } else {
                // Aqui você pode adicionar uma validação extra para checar se o user é ADMIN no Firestore
                carregarDados();
            }
        }); 
        */

        // Para testes imediatos sem Auth configurado, chame direto:
        carregarDadosMockados(); 

        // 2. Lógica do "Botão Mestre" (Configurações Globais)
        toggleSugestoes.addEventListener('change', async (e) => {
            const isAtivo = e.target.checked;
            try {
                // Atualiza o documento de configurações no Firestore
                // const configRef = doc(db, "configuracoes", "gerais");
                // await updateDoc(configRef, { sugestoesAtivas: isAtivo });
                console.log(`Regra de sugestão alterada para: ${isAtivo ? 'Valendo' : 'Pausada'}`);
            } catch (error) {
                console.error("Erro ao atualizar regra:", error);
                e.target.checked = !isAtivo; // Reverte na tela em caso de erro
                alert("Erro ao salvar configuração.");
            }
        });

        // 3. Renderização de Dados (Simulação do Firestore para você visualizar o layout)
        function carregarDadosMockados() {
            const mockData = [
                { id: "T-01", nome: "Território 01 - Centro", responsavel: "João Pedro", status: "Em andamento", coord: "-7.1234,-38.5678" },
                { id: "T-02", nome: "Território 02 - Bairro Novo", responsavel: "Sem responsável", status: "Disponível", coord: "-7.1300,-38.5700" }
            ];

            tabelaTerritorios.innerHTML = ''; // Limpa o "Carregando"

            mockData.forEach(t => {
                // Lógica de URL do Google Maps com coordenadas e imagem hospedada no GitHub Pages
                const linkMapaGoogle = `https://maps.google.com/?q=${t.coord}`;
                const linkImagemGitHub = `https://seu-usuario.github.io/seu-repo/mapas/${t.id.toLowerCase()}.jpg`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${t.nome}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${t.responsavel !== "Sem responsável" ? 
                          `<span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded">${t.responsavel}</span>` : 
                          `<span class="text-gray-400 italic">Nenhum</span>`}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${t.status === 'Disponível' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${t.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <a href="${linkMapaGoogle}" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1">
                            🗺️ Ver no Maps
                        </a>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button class="text-indigo-600 hover:text-indigo-900 mr-3" onclick="abrirModalDesignacao('${t.id}')">Designar</button>
                    </td>
                `;
                tabelaTerritorios.appendChild(tr);
            });
        }

        // Função global para o clique no botão Designar
        window.abrirModalDesignacao = (id) => {
            alert(`Aqui abriremos um Modal para atribuir um Responsável ao ${id} e alterar o status para Em andamento no Firestore.`);
        };
    </script>
</body>
</html>
