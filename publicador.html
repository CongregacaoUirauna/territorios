<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal - Gestão de Territórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-blue-800 text-white shadow-md sticky top-0 z-40">
        <div class="px-4 py-3 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="font-bold text-lg flex items-center gap-1">🗺️ Portal</span>
                <span id="userEmailDisplay" class="text-[10px] opacity-80 hidden truncate max-w-[150px]"></span>
            </div>
            <button id="btnLogout" class="bg-blue-700 hover:bg-blue-900 px-4 py-2 rounded-full text-xs font-bold transition shadow-inner">
                Sair
            </button>
        </div>
    </nav>

    <div id="loadingState" class="flex-1 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mb-4"></div>
        <p class="text-gray-500 font-medium text-sm animate-pulse">Autenticando e montando sua área...</p>
    </div>

    <main id="mainContainer" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-1">
        
        <div id="painelResponsavel" class="hidden flex flex-col h-full pb-10">
            <div class="mb-4">
                <h1 class="text-xl font-bold text-gray-800">Meus Territórios</h1>
                <p class="text-xs text-gray-500">Mapas ativos em sua responsabilidade.</p>
            </div>
            
            <button id="btnPegarMapa" class="w-full bg-green-600 active:bg-green-800 text-white px-4 py-4 rounded-xl text-sm font-bold shadow-md mb-6 flex items-center justify-center gap-2 transform active:scale-95 transition-all">
                📥 PEGAR NOVO TERRITÓRIO
            </button>

            <div id="gridTerritorios" class="flex flex-col gap-5">
                </div>
        </div>

        <div id="painelPublicador" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h1 class="text-2xl font-bold text-gray-800 mb-2 flex items-center gap-2">📢 Mural de Avisos</h1>
                <p class="text-sm text-gray-500 mb-6">Acompanhe aqui a programação da semana e informações importantes.</p>
                
                <div id="containerAvisos" class="space-y-5">
                    <p class="text-center text-sm text-gray-500 py-6 italic animate-pulse">Buscando avisos no mural...</p>
                </div>
            </div>
        </div>

    </main>

    <div id="modalNovoMapa" class="hidden fixed inset-0 z-50 flex flex-col justify-end">
        <div id="btnFecharFundo" class="absolute inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm transition-opacity"></div>
        
        <div class="relative w-full bg-white rounded-t-3xl shadow-2xl flex flex-col max-h-[85vh] animate-[slideUp_0.3s_ease-out]">
            <div class="w-full flex justify-center pt-3 pb-1">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
            </div>

            <div class="px-5 pb-3 pt-2 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-900">Mapas Disponíveis</h3>
                <button id="btnFecharModalMapa" class="text-gray-400 hover:text-gray-600 font-bold text-2xl p-2">&times;</button>
            </div>
            
            <div class="p-5 overflow-y-auto flex-1">
                <div id="alertaRegras" class="hidden mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-xl text-xs text-yellow-800 font-medium">
                </div>

                <div class="space-y-3" id="listaDisponiveis">
                    <p class="text-center text-sm text-gray-500 py-4">Carregando mapas...</p>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-100 bg-gray-50 pb-8 rounded-t-xl">
                <button id="btnCancelarModal" class="w-full py-3 bg-gray-200 text-gray-800 rounded-xl font-bold text-sm active:bg-gray-300">Voltar</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, updateDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDSPdjkdU4mWRmd1ABjDLbjjbp8gqZWJs",
            authDomain: "territorios-e9dd4.firebaseapp.com",
            projectId: "territorios-e9dd4",
            storageBucket: "territorios-e9dd4.firebasestorage.app",
            messagingSenderId: "903988299465",
            appId: "1:903988299465:web:ca8acd8fcb9b6331636f18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Referências DOM Globais
        const loadingState = document.getElementById('loadingState');
        const mainContainer = document.getElementById('mainContainer');
        const painelResponsavel = document.getElementById('painelResponsavel');
        const painelPublicador = document.getElementById('painelPublicador');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        
        let currentUserEmail = null;

        // 1. Guardião de Rota e Roteador Inteligente
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            currentUserEmail = user.email;
            userEmailDisplay.textContent = user.email;
            userEmailDisplay.classList.remove('hidden');

            try {
                // Descobre quem é o usuário consultando a coleção 'usuarios'
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                
                if (userDoc.exists()) {
                    const dados = userDoc.data();
                    
                    // Remove o spinner de carregamento
                    loadingState.classList.add('hidden');
                    mainContainer.classList.remove('hidden');

                    // Roteamento de Interface
                    if (dados.papel === 'admin') {
                        window.location.href = "admin-dashboard.html";
                    } else if (dados.papel === 'responsavel') {
                        painelResponsavel.classList.remove('hidden');
                        painelPublicador.classList.remove('hidden'); // Responsável também vê o mural!
                        iniciarEscutaMeusTerritorios(user.email);
                    } else {
                        painelPublicador.classList.remove('hidden');
                    }
                    
                    // Todos (exceto Admin) iniciam a escuta do Mural
                    iniciarEscutaDeAvisos(dados.papel, user.email);
                } else {
                    // Sem perfil? Bloqueia.
                    auth.signOut();
                }
            } catch (error) {
                console.error("Erro ao validar perfil:", error);
                alert("Erro ao carregar seu perfil. Tente novamente.");
            }
        });

        // 2. Logout Global
        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth);
        });

        // ==========================================
        // LÓGICA DO RESPONSÁVEL
        // ==========================================

        const gridTerritorios = document.getElementById('gridTerritorios');

        function iniciarEscutaMeusTerritorios(emailUsuario) {
            // Busca territórios onde o responsavelAtual é igual ao e-mail logado
            const q = query(collection(db, "territorios"), where("responsavelAtual", "==", emailUsuario));
            
            onSnapshot(q, (snapshot) => {
                gridTerritorios.innerHTML = '';

                if (snapshot.empty) {
                    gridTerritorios.innerHTML = `
                        <div class="col-span-full bg-white p-8 rounded-lg border border-dashed border-gray-300 text-center">
                            <p class="text-gray-500 mb-4">Você não possui nenhum território designado no momento.</p>
                            <p class="text-sm text-gray-400">Clique em "Pegar Novo Território" para começar ou aguarde uma designação.</p>
                        </div>
                    `;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const t = docSnap.data();
                    const idDoc = docSnap.id;
                    const linkImagemGitHub = `https://congregacaouirauna.github.io/territorios/mapas/mapa-${t.numero}.jpg`;

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden flex flex-col";
                    
                    card.innerHTML = `
                        <div class="h-56 bg-gray-100 relative">
                            <img src="${linkImagemGitHub}" alt="Mapa ${t.numero}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/600x400?text=Mapa+Indisponível'">
                            <div class="absolute top-3 right-3 bg-blue-600 text-white text-sm font-black px-3 py-1.5 rounded-full shadow-lg border-2 border-white">
                                ${t.numero}
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-black text-xl text-gray-800 mb-1 leading-tight">${t.nome}</h3>
                            <a href="${t.mapaUrl}" target="_blank" class="text-blue-600 active:text-blue-800 text-sm font-bold mb-5 flex items-center gap-1 py-2">
                                📍 Abrir no Google Maps ➔
                            </a>
                            
                            <div class="mt-auto pt-4 border-t border-gray-100">
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Sua Nota de Pausa</label>
                                <div class="flex flex-col gap-2">
                                    <input type="text" id="nota-${idDoc}" value="${t.notaPausa || ''}" placeholder="Ex: Casa verde da esquina..." class="w-full bg-gray-50 border border-gray-300 rounded-xl text-sm p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white outline-none transition-all">
                                    <button onclick="window.salvarNota('${idDoc}')" class="w-full bg-gray-800 text-white active:bg-gray-900 py-3 rounded-xl text-sm font-bold shadow-sm transition-all">
                                        Salvar Anotação
                                    </button>
                                </div>
                            </div>

                            <button onclick="window.concluirTerritorio('${idDoc}', '${t.numero}')" class="mt-5 w-full bg-orange-100 active:bg-orange-200 text-orange-800 border-2 border-orange-200 py-3.5 rounded-xl text-sm font-black transition-all">
                                ✅ DEVOLVER TERRITÓRIO
                            </button>
                        </div>
                    `;
                    gridTerritorios.appendChild(card);
                });
            });
        }

        // --- Funções injetadas no Window para funcionar via onclick nos cards gerados dinamicamente ---

        window.salvarNota = async (idDoc) => {
            const inputNota = document.getElementById(`nota-${idDoc}`);
            const novaNota = inputNota.value.trim();
            const btn = inputNota.nextElementSibling;
            
            btn.innerText = "...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "territorios", idDoc), {
                    notaPausa: novaNota
                });
                btn.innerText = "Salvo!";
                setTimeout(() => { btn.innerText = "Salvar"; btn.disabled = false; }, 2000);
            } catch (error) {
                alert("Erro ao salvar nota.");
                btn.innerText = "Salvar"; btn.disabled = false;
            }
        };

        window.concluirTerritorio = async (idDoc, numero) => {
            if (confirm(`Tem certeza que deseja CONCLUIR e DEVOLVER o território ${numero}?\n\nEle sairá da sua lista.`)) {
                try {
                    // Update Crítico: Limpa o responsável, muda status e injeta a data/hora do servidor.
                    await updateDoc(doc(db, "territorios", idDoc), {
                        responsavelAtual: null,
                        status: "Disponível",
                        ultimaConclusao: serverTimestamp(),
                        notaPausa: "" // Limpa o checkpoint para o próximo irmão
                    });
                } catch (error) {
                    console.error("Erro ao concluir:", error);
                    alert("Erro ao devolver o território.");
                }
            }
        };

        // ==========================================
        // LÓGICA DO MURAL DE AVISOS E PROGRAMAÇÃO
        // ==========================================
        function iniciarEscutaDeAvisos(papelUsuario, emailUsuario) {
            const containerAvisos = document.getElementById('containerAvisos');
            
            onSnapshot(collection(db, "anuncios"), (snapshot) => {
                containerAvisos.innerHTML = '';
                let temAvisoVisivel = false;

                // 1. Extrai e Ordena os avisos (do mais novo para o mais velho)
                let avisos = [];
                snapshot.forEach(doc => avisos.push({ id: doc.id, ...doc.data() }));
                avisos.sort((a, b) => new Date(b.criadoEm) - new Date(a.criadoEm));

                avisos.forEach(a => {
                    // 2. Filtro de Segurança (Público Alvo)
                    let podeVer = false;
                    if (a.publicoAlvo === 'todos') podeVer = true;
                    else if (a.publicoAlvo === 'responsaveis' && papelUsuario === 'responsavel') podeVer = true;
                    else if (a.publicoAlvo === 'publicadores' && papelUsuario === 'publicador') podeVer = true;
                    else if (a.publicoAlvo === 'especificos' && a.pessoasEspecificas && a.pessoasEspecificas.includes(emailUsuario)) podeVer = true;

                    if (!podeVer) return; // Se não for para ele, pula para o próximo!
                    temAvisoVisivel = true;

                    // 3. Renderiza o Card
                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden";
                    
                    let htmlConteudo = '';

                    if (a.tipo === 'texto') {
                        // Layout de Aviso em Texto
                        htmlConteudo = `<p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed">${a.conteudo}</p>`;
                    } else {
                        // Layout de Programação (Tabela otimizada para Celular)
                        let linhasHtml = '';
                        a.conteudo.forEach(linha => {
                            linhasHtml += `
                                <div class="bg-gray-50 border border-gray-100 rounded-xl p-3 mb-2 flex flex-col gap-1">
                                    <div class="flex justify-between items-center border-b border-gray-200 pb-1 mb-1">
                                        <span class="font-black text-blue-800 text-sm">${linha.dia}</span>
                                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded-full">🕒 ${linha.hora}</span>
                                    </div>
                                    <div class="flex items-start gap-2 text-sm text-gray-700 mt-1">
                                        <span>📍</span>
                                        <span class="font-medium">${linha.local}</span>
                                    </div>
                                    <div class="flex items-start gap-2 text-sm text-gray-600">
                                        <span>👔</span>
                                        <span>Dirigente: <strong>${linha.dirigente}</strong></span>
                                    </div>
                                </div>
                            `;
                        });
                        htmlConteudo = `<div class="mt-2">${linhasHtml}</div>`;
                    }

                    card.innerHTML = `
                        <div class="bg-blue-50/50 px-5 py-3 border-b border-gray-100 flex items-center gap-3">
                            <span class="text-xl">📢</span>
                            <h3 class="font-black text-gray-800 text-base leading-tight">${a.titulo}</h3>
                        </div>
                        <div class="p-5">
                            ${htmlConteudo}
                        </div>
                    `;
                    
                    containerAvisos.appendChild(card);
                });

                if (!temAvisoVisivel) {
                    containerAvisos.innerHTML = `
                        <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center">
                            <span class="text-3xl block mb-2">📭</span>
                            <p class="text-gray-500 text-sm font-medium">Nenhum aviso ou programação para você no momento.</p>
                        </div>
                    `;
                }
            });
        }
        
        // ==========================================
        // LÓGICA DE PEGAR NOVO TERRITÓRIO (Com Regras)
        // ==========================================

        const modalNovoMapa = document.getElementById('modalNovoMapa');
        const listaDisponiveis = document.getElementById('listaDisponiveis');
        const alertaRegras = document.getElementById('alertaRegras');

        const abrirModal = () => modalNovoMapa.classList.remove('hidden');
        const fecharModal = () => modalNovoMapa.classList.add('hidden');

        document.getElementById('btnPegarMapa').addEventListener('click', async () => {
            abrirModal();
            listaDisponiveis.innerHTML = '<div class="text-center py-4"><div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-blue-600 rounded-full"></div></div>';
            
            try {
                // 1. Lê as Regras Mestras
                const configSnap = await getDoc(doc(db, "configuracoes", "gerais"));
                const config = configSnap.exists() ? configSnap.data() : { sugestaoAutomatica: false, varreduraCompleta: false };

                // 2. Busca mapas disponíveis
                const q = query(collection(db, "territorios"), where("status", "==", "Disponível"));
                const querySnapshot = await getDocs(q);
                
                let mapas = [];
                querySnapshot.forEach(doc => mapas.push({ id: doc.id, ...doc.data() }));

                // 3. Aplica Regra: Varredura Completa (Filtra mapas já trabalhados)
                if (config.varreduraCompleta) {
                    mapas = mapas.filter(m => m.ultimaConclusao === null);
                    alertaRegras.innerHTML = "<strong>Trava Ativa:</strong> Apenas mapas que ainda não foram trabalhados nesta rodada estão disponíveis.";
                    alertaRegras.classList.remove('hidden');
                } else {
                    alertaRegras.classList.add('hidden');
                }

                // 4. Aplica Regra: Sugestão Automática (Ordena pelo mais antigo)
                if (config.sugestaoAutomatica && mapas.length > 0) {
                    mapas.sort((a, b) => {
                        // Se for null (nunca trabalhado no ciclo), tem prioridade total (joga pro topo)
                        if (!a.ultimaConclusao) return -1;
                        if (!b.ultimaConclusao) return 1;
                        // Compara timestamps reais
                        return a.ultimaConclusao.toMillis() - b.ultimaConclusao.toMillis();
                    });
                } else if (!config.sugestaoAutomatica) {
                    // Ordenação padrão numérica se a sugestão estiver desligada
                    mapas.sort((a, b) => a.numero.localeCompare(b.numero, undefined, {numeric: true}));
                }

                // 5. Renderiza a lista
                listaDisponiveis.innerHTML = '';
                
                if (mapas.length === 0) {
                    listaDisponiveis.innerHTML = '<p class="text-center text-gray-500 py-4 font-medium">Nenhum território disponível no momento com as regras atuais.</p>';
                    return;
                }

                mapas.forEach((m, index) => {
                    // Destaque visual para o mapa sugerido (o primeiro da lista) se a sugestão estiver ligada
                    const isSugerido = config.sugestaoAutomatica && index === 0;
                    const badgeSugerido = isSugerido ? '<span class="ml-2 bg-green-100 text-green-800 text-[10px] uppercase font-bold px-2 py-0.5 rounded border border-green-200">Recomendado</span>' : '';
                    
                    const div = document.createElement('div');
                    div.className = `flex justify-between items-center p-3 border rounded-md transition ${isSugerido ? 'bg-green-50 border-green-200' : 'bg-white hover:bg-gray-50 border-gray-200'}`;
                    
                    div.innerHTML = `
                        <div class="pr-2">
                            <p class="font-bold text-gray-800 text-sm">${m.numero} - ${m.nome} ${badgeSugerido}</p>
                            <p class="text-xs text-gray-500 mt-0.5">Última conclusão: ${m.ultimaConclusao ? new Date(m.ultimaConclusao.toDate()).toLocaleDateString('pt-BR') : 'Nunca / Rodada Nova'}</p>
                        </div>
                        <button onclick="window.autoDesignar('${m.id}', '${m.numero}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-1.5 px-3 rounded shadow-sm whitespace-nowrap">
                            Pegar
                        </button>
                    `;
                    listaDisponiveis.appendChild(div);
                });

            } catch (error) {
                console.error(error);
                listaDisponiveis.innerHTML = '<p class="text-center text-red-500 py-4 text-sm">Erro ao carregar mapas.</p>';
            }
        });

        document.getElementById('btnFecharModalMapa').addEventListener('click', fecharModal);
        document.getElementById('btnCancelarModal').addEventListener('click', fecharModal);

        // Ação de se auto-designar a um território
        window.autoDesignar = async (idDoc, numero) => {
            if (!currentUserEmail) return;

            try {
                await updateDoc(doc(db, "territorios", idDoc), {
                    responsavelAtual: currentUserEmail,
                    status: "Em andamento"
                });
                fecharModal();
                // Não precisa chamar função de atualizar a tela, o onSnapshot faz a mágica de injetar o card instantaneamente.
            } catch (error) {
                alert("Erro ao pegar território. Verifique sua conexão.");
            }
        };

    </script>
</body>
</html>
